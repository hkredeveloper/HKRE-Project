# HKRE full scrape — run manually or on a schedule.
#
# Repo secrets (Settings → Secrets and variables → Actions → Repository secrets):
#   EITHER GOOGLE_TOKEN_JSON_B64 — one-line base64 of your local OAuth user JSON (= config/credentials.json),
#   OR paste that JSON verbatim into GOOGLE_TOKEN_JSON — GitHub must receive it escaped; workflow uses toJSON(...)
#       so curly braces don't break YAML. Easiest workaround: single-line GOOGLE_TOKEN_JSON_B64 only.
#   GOOGLE_OAUTH_JSON           — OAuth "installed app" client JSON; raw or base64 (needed when access token expires).
#
# Credentials mode (recommended for CI):
#   HKRE_USE_OAUTH_FOR_SHEETS=1 (set below): Sheets/Docs use the SAME OAuth identity as Drive. No worksheet
#   sharing with a bot account needed.
#
# Alternative (local/testing):
#   Unset HKRE_USE_OAUTH_FOR_SHEETS and provide GOOGLE_CREDS_JSON — a *service-account* JSON. You MUST share the
#   HKRE devm spreadsheet with that account's email (Editors), or Sheets returns HTTP 403.
#
# Optional:
#   PARENT_FOLDER_ID        — overrides default Drive folder in config/settings.py
#   HKRE_DEVM_SPREADSHEET_ID — override default devm Google Sheet ID

name: HKRE Scraper

on:
  workflow_dispatch:
  # Weekly run — edit cron to suit your timezone (times are UTC).
  schedule:
    - cron: "0 18 * * 0" # Sundays 18:00 UTC

permissions:
  contents: read

concurrency:
  group: hkre-scraper-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      PYTHONUNBUFFERED: "1"
      HKRE_USE_OAUTH_FOR_SHEETS: "1"
      # toJSON(...) keeps JSON-shaped secrets valid YAML scalars ({ would otherwise parse as YAML flow mapping → empty env).
      GOOGLE_CREDS_JSON: ${{ toJSON(secrets.GOOGLE_CREDS_JSON || '') }}
      GOOGLE_OAUTH_JSON: ${{ toJSON(secrets.GOOGLE_OAUTH_JSON || '') }}
      GOOGLE_TOKEN_JSON_B64: ${{ toJSON(secrets.GOOGLE_TOKEN_JSON_B64 || '') }}
      GOOGLE_TOKEN_JSON: ${{ toJSON(secrets.GOOGLE_TOKEN_JSON || '') }}
      PARENT_FOLDER_ID: ${{ secrets.PARENT_FOLDER_ID }}
      HKRE_SKIP_METADATA_SHEET_INSERT: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate secrets for OAuth Sheets mode
        env:
          TOKEN_B64: ${{ toJSON(secrets.GOOGLE_TOKEN_JSON_B64 || '') }}
          TOKEN_JSON: ${{ toJSON(secrets.GOOGLE_TOKEN_JSON || '') }}
          CLIENT_JSON: ${{ toJSON(secrets.GOOGLE_OAUTH_JSON || '') }}
        run: |
          # Safe diagnostics — lengths only (do not echo secret bodies).
          b64_trim=$(echo -n "$TOKEN_B64" | tr -d '[:space:]')
          json_trim=$(echo -n "$TOKEN_JSON" | tr -d '[:space:]')
          oauth_trim=$(echo -n "$CLIENT_JSON" | tr -d '[:space:]')
          echo "Lengths: GOOGLE_TOKEN_JSON_B64=${#b64_trim} chars, GOOGLE_TOKEN_JSON=${#json_trim} chars, GOOGLE_OAUTH_JSON=${#oauth_trim}"
          if [ ${#b64_trim} -eq 0 ] && [ ${#json_trim} -eq 0 ]; then
            echo "Missing token: add Repository secret GOOGLE_TOKEN_JSON_B64 (base64 of config/credentials.json)" >&2
            echo "               OR GOOGLE_TOKEN_JSON (paste authorized_user JSON as multiline)." >&2
            echo "Name must match exactly — not Codespaces/org-only secrets unless this workflow uses an environment." >&2
            exit 1
          fi
          if [ ${#oauth_trim} -eq 0 ]; then
            echo "Missing GOOGLE_OAUTH_JSON — OAuth client JSON (installed app) needed when access token expires in CI." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java (Tabula)
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jre-headless unzip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Tabula JAR
        run: |
          mkdir -p config
          JAR=src/converters/tabula-1.0.2-jar-with-dependencies.jar
          if [ ! -f "$JAR" ]; then
            echo "Downloading Tabula JAR..."
            curl -fsSL -o "$JAR" \
              "https://github.com/tabulapdf/tabula-java/releases/download/v1.0.2/tabula-1.0.2-jar-with-dependencies.jar"
          fi
          test -f "$JAR" || { echo "Tabula JAR missing"; exit 1; }

      - name: Seed OAuth token (Sheets + Drive)
        env:
          GOOGLE_TOKEN_JSON: ${{ toJSON(secrets.GOOGLE_TOKEN_JSON || '') }}
          GOOGLE_TOKEN_JSON_B64: ${{ toJSON(secrets.GOOGLE_TOKEN_JSON_B64 || '') }}
        run: |
          mkdir -p config
          python - <<'PY'
          import os, base64, pathlib, sys, json

          raw_in = os.environ.get("GOOGLE_TOKEN_JSON") or ""
          b64_in = os.environ.get("GOOGLE_TOKEN_JSON_B64") or ""
          # Base64 secrets may be pasted with stray newlines; remove all whitespace.
          b64_clean = "".join(b64_in.split())
          path = pathlib.Path("config/credentials.json")

          def coerce_token_text(s):
              """Normalize token env: unwrap JSON-string layer GitHub/toJSON sometimes leaves on empty secrets."""
              t = (s or "").strip().lstrip("\ufeff")
              if len(t) >= 2 and t[0] == '"' and t[-1] == '"':
                  try:
                      inner = json.loads(t)
                      if isinstance(inner, str):
                          return inner.strip()
                  except json.JSONDecodeError:
                      pass
              return t

          # Prefer base64 first (single line, fewer GH/YAML quirks).
          if b64_clean:
              try:
                  decoded = base64.b64decode(b64_clean)
              except Exception as e:
                  print(f"GOOGLE_TOKEN_JSON_B64 is not valid base64: {e}", file=sys.stderr)
                  sys.exit(1)
              path.write_bytes(decoded)
              print("Seeded credentials from GOOGLE_TOKEN_JSON_B64")
          else:
              raw = coerce_token_text(raw_in)
              if raw.startswith("{"):
                  path.write_text(raw)
                  print("Seeded credentials from GOOGLE_TOKEN_JSON")
              elif raw:
                  print(
                      "GOOGLE_TOKEN_JSON is set but does not look like OAuth JSON "
                      '(expected {...} beginning with "{"). Prefer GOOGLE_TOKEN_JSON_B64 '
                      "(base64 of config/credentials.json).",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              else:
                  print(
                      "::error ::Fill GOOGLE_TOKEN_JSON with full credentials.json, or GOOGLE_TOKEN_JSON_B64.",
                      file=sys.stderr,
                  )
                  sys.exit(1)

          blob = path.read_text()
          if not blob.strip():
              print(
                  "credentials empty — paste raw credentials.json into GOOGLE_TOKEN_JSON, "
                  "or put base64 in GOOGLE_TOKEN_JSON_B64 only (not raw JSON in B64).",
                  file=sys.stderr,
              )
              sys.exit(1)
          try:
              data = json.loads(blob)
          except json.JSONDecodeError as e:
              print(
                  "credentials not valid JSON:",
                  e,
                  "| Use GOOGLE_TOKEN_JSON_B64 = base64 of config/credentials.json (recommended), "
                  "or paste the full JSON object in GOOGLE_TOKEN_JSON (must start with {).",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not isinstance(data, dict):
              print(f"credentials JSON must be an object {{}}, got {type(data).__name__}", file=sys.stderr)
              sys.exit(1)
          if not data.get("refresh_token"):
              print("credentials must include refresh_token", file=sys.stderr)
              sys.exit(1)
          if not data.get("client_id"):
              print("credentials must include client_id", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run scraper
        working-directory: ${{ github.workspace }}
        run: python src/main.py

      - name: Upload debug folder on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hkre-debug
          path: debug
          if-no-files-found: warn
