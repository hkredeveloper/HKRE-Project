# HKRE full scrape — run manually or on a schedule.
#
# Repo secrets (Settings → Secrets → Actions):
#   GOOGLE_TOKEN_JSON_B64 — base64 of OAuth authorized_user JSON written to config/credentials.json before run.
#   GOOGLE_OAUTH_JSON     — OAuth client JSON (supports base64) so refresh tokens work when access token expires.
#
# Credentials mode (recommended for CI):
#   HKRE_USE_OAUTH_FOR_SHEETS=1 (set below): Sheets/Docs use the SAME OAuth identity as Drive. No worksheet
#   sharing with a bot account needed.
#
# Alternative (local/testing):
#   Unset HKRE_USE_OAUTH_FOR_SHEETS and provide GOOGLE_CREDS_JSON — a *service-account* JSON. You MUST share the
#   HKRE devm spreadsheet with that account's email (Editors), or Sheets returns HTTP 403.
#
# Optional:
#   PARENT_FOLDER_ID        — overrides default Drive folder in config/settings.py
#   HKRE_DEVM_SPREADSHEET_ID — override default devm Google Sheet ID

name: HKRE Scraper

on:
  workflow_dispatch:
  # Weekly run — edit cron to suit your timezone (times are UTC).
  schedule:
    - cron: "0 18 * * 0" # Sundays 18:00 UTC

permissions:
  contents: read

concurrency:
  group: hkre-scraper-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      PYTHONUNBUFFERED: "1"
      HKRE_USE_OAUTH_FOR_SHEETS: "1"
      GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
      GOOGLE_OAUTH_JSON: ${{ secrets.GOOGLE_OAUTH_JSON }}
      GOOGLE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}
      PARENT_FOLDER_ID: ${{ secrets.PARENT_FOLDER_ID }}
      HKRE_SKIP_METADATA_SHEET_INSERT: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate secrets for OAuth Sheets mode
        env:
          TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}
          CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_JSON }}
        run: |
          if [ -z "$TOKEN_B64" ]; then
            echo "Missing GOOGLE_TOKEN_JSON_B64 — base64-encode your OAuth authorized_user credentials JSON." >&2
            exit 1
          fi
          if [ -z "$CLIENT_JSON" ]; then
            echo "Missing GOOGLE_OAUTH_JSON — OAuth client secrets JSON is required when access tokens expire in CI." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java (Tabula)
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jre-headless unzip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Tabula JAR
        run: |
          mkdir -p config
          JAR=src/converters/tabula-1.0.2-jar-with-dependencies.jar
          if [ ! -f "$JAR" ]; then
            echo "Downloading Tabula JAR..."
            curl -fsSL -o "$JAR" \
              "https://github.com/tabulapdf/tabula-java/releases/download/v1.0.2/tabula-1.0.2-jar-with-dependencies.jar"
          fi
          test -f "$JAR" || { echo "Tabula JAR missing"; exit 1; }

      - name: Seed OAuth token (Sheets + Drive)
        run: |
          echo "$GOOGLE_TOKEN_JSON_B64" | base64 --decode > config/credentials.json
          test -s config/credentials.json || { echo "Decoded credentials empty"; exit 1; }

      - name: Run scraper
        working-directory: ${{ github.workspace }}
        run: python src/main.py

      - name: Upload debug folder on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hkre-debug
          path: debug
          if-no-files-found: warn
